<div class="flex items-center justify-center min-h-screen bg-gray-100">
  <form
    class="w-full max-w-sm bg-white p-10 rounded-lg shadow-md"
    (ngSubmit)="onSubmit()"
    #registerForm="ngForm"
  >
    <h1 class="text-2xl font-semibold text-center mb-6">Create account</h1>

    <div class="mb-5 flex flex-col">
      <label for="username" class="text-sm text-gray-700 mb-1.5">Username</label>
      <input
        id="username"
        name="username"
        type="text"
        [(ngModel)]="username"
        required
        minlength="3"
        #usernameField="ngModel"
        class="px-3 py-2.5 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-indigo-600"
      />
      <span class="text-red-600 text-xs mt-1.5" *ngIf="usernameField.invalid && usernameField.touched">
        Username must be at least 3 characters.
      </span>
    </div>

    <div class="mb-5 flex flex-col">
      <label for="firstname" class="text-sm text-gray-700 mb-1.5">First name</label>
      <input
        id="firstname"
        name="firstname"
        type="text"
        [(ngModel)]="firstname"
        required
        #firstnameField="ngModel"
        class="px-3 py-2.5 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-indigo-600"
      />
      <span class="text-red-600 text-xs mt-1.5" *ngIf="firstnameField.invalid && firstnameField.touched">
        First name is required.
      </span>
    </div>

    <div class="mb-5 flex flex-col">
      <label for="lastname" class="text-sm text-gray-700 mb-1.5">Last name</label>
      <input
        id="lastname"
        name="lastname"
        type="text"
        [(ngModel)]="lastname"
        required
        #lastnameField="ngModel"
        class="px-3 py-2.5 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-indigo-600"
      />
      <span class="text-red-600 text-xs mt-1.5" *ngIf="lastnameField.invalid && lastnameField.touched">
        Last name is required.
      </span>
    </div>

    <div class="mb-5 flex flex-col">
      <label for="phone" class="text-sm text-gray-700 mb-1.5">Phone</label>
      <input
        id="phone"
        name="phone"
        type="tel"
        [(ngModel)]="phone"
        required
        pattern="^\+?[0-9]{8,15}$"
        #phoneField="ngModel"
        class="px-3 py-2.5 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-indigo-600"
      />
      <span class="text-red-600 text-xs mt-1.5" *ngIf="phoneField.invalid && phoneField.touched">
        Enter a valid phone number.
      </span>
    </div>

    <div class="mb-5 flex flex-col">
      <label for="email" class="text-sm text-gray-700 mb-1.5">Email</label>
      <input
        id="email"
        name="email"
        type="email"
        [(ngModel)]="email"
        required
        email
        #emailField="ngModel"
        class="px-3 py-2.5 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-indigo-600"
      />
      <span class="text-red-600 text-xs mt-1.5" *ngIf="emailField.invalid && emailField.touched">
        Enter a valid email address.
      </span>
    </div>

    <div class="mb-5 flex flex-col">
      <label for="password" class="text-sm text-gray-700 mb-1.5">Password</label>
      <input
        id="password"
        name="password"
        type="password"
        [(ngModel)]="password"
        required
        minlength="8"
        #passwordField="ngModel"
        class="px-3 py-2.5 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-indigo-600"
      />
      <span class="text-red-600 text-xs mt-1.5" *ngIf="passwordField.invalid && passwordField.touched">
        Password must be at least 8 characters.
      </span>
    </div>

    <p class="text-red-600 text-xs mb-4" *ngIf="errorMessage">{{ errorMessage }}</p>
    <p class="text-green-600 text-xs mb-4" *ngIf="successMessage">{{ successMessage }}</p>

    <button
      type="submit"
      [disabled]="registerForm.invalid || isLoading"
      class="w-full py-2.5 bg-indigo-600 text-white rounded-md text-sm font-medium
             hover:bg-indigo-700 disabled:bg-indigo-300 disabled:cursor-not-allowed transition-colors"
    >
      {{ isLoading ? 'Creating account...' : 'Register' }}
    </button>

    <p class="text-center text-sm mt-5 text-gray-600">
      Already have an account?
      <a routerLink="/login" class="text-indigo-600 hover:underline">Log in</a>
    </p>
  </form>
</div>
