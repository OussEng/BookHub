<div class="max-w-2xl mx-auto mt-12 px-6">
  <header class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-semibold">Dashboard</h1>
    <button
      (click)="onLogout()"
      class="px-4 py-2 bg-red-500 text-white rounded-md text-sm hover:bg-red-600 transition-colors"
    >
      Log out
    </button>
  </header>

  <section *ngIf="user" class="bg-white p-6 rounded-lg shadow-sm">
    <p class="text-gray-500 text-sm mb-1">Logged in as</p>
    <p class="text-lg font-medium mb-4">{{ user.firstname }} {{ user.lastname }}</p>

    <div class="grid grid-cols-2 gap-4 text-sm">
      <div>
        <p class="text-gray-500">User ID</p>
        <p class="font-medium">{{ user.id }}</p>
      </div>
      <div>
        <p class="text-gray-500">Username</p>
        <p class="font-medium">{{ user.username }}</p>
      </div>
      <div>
        <p class="text-gray-500">Email</p>
        <p class="font-medium">{{ user.email }}</p>
      </div>
      <div>
        <p class="text-gray-500">Phone</p>
        <p class="font-medium">{{ user.phone }}</p>
      </div>
      <div>
        <p class="text-gray-500">Role</p>
        <p class="font-medium">{{ user.role }}</p>
      </div>
    </div>
  </section>

  <section *ngIf="!user" class="text-gray-500 text-sm">
    Loading user info...
  </section>
</div>
