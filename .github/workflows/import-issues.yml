name: Import Issues from CSV
on:
  workflow_dispatch:
    inputs:
      csv_file:
        description: 'Chemin du fichier CSV dans le repo'
        default: 'backlog/sprint0_conception_tickets.csv'

jobs:
  import:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Import issues
        uses: dsanchezcr/issue-importer-action@v1.0.0
        with:
          file-path: ${{ github.event.inputs.csv_file }}
          file-format: csv
          github-token: ${{ secrets.GITHUB_TOKEN }}
